[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/upstox/*"
  to = "/.netlify/functions/upstox/:splat"
  status = 200

[[redirects]]
  from = "/api/market-status"
  to = "/.netlify/functions/market-status"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
